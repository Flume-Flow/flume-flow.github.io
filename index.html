<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<meta property="og:description" content="Flume Flow is coming soon. A new project from the Flume-Flow team." />

<meta name="twitter:card" content="summary" />

<!-- Inline SVG favicon (no extra request) -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23060a1c'/%3E%3Ccircle cx='10' cy='11' r='3' fill='%2304cbf0'/%3E%3Ccircle cx='22' cy='14' r='3' fill='%23006ffa'/%3E%3Ccircle cx='15' cy='22' r='3' fill='%23d180f3'/%3E%3Cpath d='M10 11 L22 14 M22 14 L15 22 M10 11 L15 22' stroke='%239fb0d8' stroke-width='1.2' opacity='.6'/%3E%3C/svg%3E" />

<!-- Fonts: only the weights actually used (Sora 400/700, Space Mono 400) -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700&family=Space+Mono:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --cyan:   #04cbf0;
    --blue:   #006ffa;
    --violet: #d180f3;
    --navy:   #0a1232;
    --ink:    #060a1c;
    --mist:   #9fb0d8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--ink);
    color: #fff;
    min-height: 100vh;
    display: grid;
    place-items: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    inset: -20%;
    background:
      radial-gradient(40% 50% at 30% 28%, rgba(4,203,240,0.22), transparent 70%),
      radial-gradient(45% 55% at 70% 70%, rgba(209,128,243,0.20), transparent 70%),
      radial-gradient(60% 60% at 50% 50%, rgba(0,111,250,0.16), transparent 75%);
    filter: blur(10px);
    animation: drift 22s ease-in-out infinite alternate;
    z-index: 0;
    will-change: transform;
  }
  @keyframes drift {
    0%   { transform: translate(-2%, -1%) scale(1.05); }
    100% { transform: translate(2%, 2%)  scale(1.12); }
  }

  .net {
    position: fixed; inset: 0; z-index: 1;
    width: 100%; height: 100%;
    display: block;
    /* fade the network toward the centre so it sits behind, not over, the content */
    mask-image: radial-gradient(circle at 50% 45%, transparent 14%, black 70%);
    -webkit-mask-image: radial-gradient(circle at 50% 45%, transparent 14%, black 70%);
  }

  .stage {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    animation: rise 1.1s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Flume is the hero; Flow is a quiet supporting label */
  .wordmark {
    font-weight: 700;
    font-size: clamp(2.8rem, 9.5vw, 5.6rem);
    letter-spacing: -0.03em;
    line-height: 0.95;
    color: #e3edff;
    text-shadow: 0 0 28px rgba(86, 178, 240, 0.28);
  }
  .subword {
    margin-top: 0.5rem;
    font-weight: 400;
    font-size: clamp(0.85rem, 2.4vw, 1.15rem);
    letter-spacing: 0.55em;
    text-transform: uppercase;
    color: var(--mist);
    opacity: 0.6;
    padding-left: 0.55em;
  }

  .soon {
    margin-top: 2.6rem;
    display: inline-flex;
    align-items: center;
    gap: 1rem;
    font-family: 'Space Mono', monospace;
    font-size: clamp(0.8rem, 2vw, 1rem);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #cfe0ff;
  }
  .soon .rule {
    width: clamp(38px, 8vw, 70px);
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cyan), var(--violet), transparent);
    background-size: 200% 100%;
    animation: slide 3s linear infinite;
    border-radius: 2px;
  }
  @keyframes slide {
    from { background-position: 200% 0; }
    to   { background-position: -200% 0; }
  }

  footer {
    position: fixed;
    bottom: 1.4rem; left: 0; right: 0;
    z-index: 2;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    color: rgba(159,176,216,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.85rem;
  }
  footer .gh {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    color: var(--mist);
    text-decoration: none;
    opacity: 0.7;
    border-radius: 4px;
    transition: opacity 0.2s, color 0.2s;
  }
  footer .gh:hover { opacity: 1; color: var(--cyan); }
  footer .gh:focus-visible {
    opacity: 1; color: var(--cyan);
    outline: 2px solid var(--cyan);
    outline-offset: 3px;
  }
  footer .gh svg { width: 15px; height: 15px; fill: currentColor; display: block; }
  footer .sep { opacity: 0.4; }

  .markwrap {
    position: relative;
    width: clamp(120px, 19vw, 178px);
    height: clamp(130px, 20.6vw, 193px);
    margin: 0 auto 1.6rem;
    animation: float 6s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes float {
    0%,100% { transform: translateY(0) rotate(-0.5deg); }
    50%     { transform: translateY(-10px) rotate(0.5deg); }
  }
  .markcanvas {
    width: 100%; height: 100%; display: block;
    filter: drop-shadow(0 8px 30px rgba(4,203,240,0.30));
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before { animation: none !important; }
  }
</style>
</head>
<body>
  <canvas class="net" id="net" aria-hidden="true"></canvas>

  <main class="stage">
    <div class="markwrap">
      <canvas class="markcanvas" id="markcanvas" aria-hidden="true"></canvas>
    </div>

    <h1 class="wordmark">Flume</h1>

    <p class="soon">
      <span class="rule" aria-hidden="true"></span>
      <span>Coming soon</span>
      <span class="rule" aria-hidden="true"></span>
    </p>
  </main>

  <footer>
    <span>&copy; <span id="yr"></span> Flume</span>
    <span class="sep" aria-hidden="true">&middot;</span>
    <a class="gh" href="https://github.com/Flume-Flow" rel="noopener" aria-label="Flume-Flow on GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      <span>Flume</span>
    </a>
  </footer>

  <script>
  document.getElementById('yr').textContent = new Date().getFullYear();

  // Shared visibility flag: pause every animation loop when the tab is hidden.
  let pageVisible = !document.hidden;
  document.addEventListener('visibilitychange', () => {
    const wasHidden = !pageVisible;
    pageVisible = !document.hidden;
    if (pageVisible && wasHidden) document.dispatchEvent(new Event('flume:resume'));
  });

  // Debounce helper for resize handlers.
  function debounce(fn, ms) {
    let id;
    return function () { clearTimeout(id); id = setTimeout(fn, ms); };
  }
  </script>

  <!-- Background network -->
  <script>
  (function () {
    const canvas = document.getElementById('net');
    const ctx = canvas.getContext('2d');
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    const COLORS = ['#04cbf0', '#006ffa', '#d180f3', '#9fb0d8'];
    let W, H, DPR, nodes = [], signals = [];
    const LINK_DIST = 150, LINK_DIST_SQ = LINK_DIST * LINK_DIST;
    const FRAME_MS = 1000 / 30;   // throttle to ~30fps

    function rand(a, b) { return a + Math.random() * (b - a); }

    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = canvas.clientWidth;
      H = canvas.clientHeight;
      canvas.width = W * DPR;
      canvas.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      buildNodes();
    }

    function buildNodes() {
      const count = Math.min(70, Math.round((W * H) / 22000));
      nodes = [];
      for (let i = 0; i < count; i++) {
        const isSquare = Math.random() < 0.32;
        nodes.push({
          x: rand(0, W), y: rand(0, H),
          vx: rand(-0.18, 0.18), vy: rand(-0.18, 0.18),
          size: isSquare ? rand(4, 8) : rand(1.6, 3.6),
          square: isSquare,
          color: COLORS[(Math.random() * COLORS.length) | 0],
          pulse: rand(0, Math.PI * 2)
        });
      }
    }

    function spawnSignal() {
      if (nodes.length < 2) return;
      const a = (Math.random() * nodes.length) | 0;
      let b = -1, best = LINK_DIST_SQ;
      for (let j = 0; j < nodes.length; j++) {
        if (j === a) continue;
        const dx = nodes[a].x - nodes[j].x, dy = nodes[a].y - nodes[j].y;
        const d2 = dx * dx + dy * dy;
        if (d2 < best && Math.random() < 0.5) { best = d2; b = j; }
      }
      if (b === -1) return;
      signals.push({ a, b, t: 0, speed: rand(0.006, 0.016), color: nodes[a].color });
    }

    let frame = 0, last = 0, running = false;

    function render() {
      ctx.clearRect(0, 0, W, H);
      frame++;

      if (!reduce) {
        for (const n of nodes) {
          n.x += n.vx; n.y += n.vy;
          if (n.x < 0 || n.x > W) n.vx *= -1;
          if (n.y < 0 || n.y > H) n.vy *= -1;
          n.pulse += 0.02;
        }
      }

      // links (squared-distance test avoids a sqrt per pair)
      for (let i = 0; i < nodes.length; i++) {
        const a = nodes[i];
        for (let j = i + 1; j < nodes.length; j++) {
          const b = nodes[j];
          const dx = a.x - b.x, dy = a.y - b.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < LINK_DIST_SQ) {
            const alpha = (1 - Math.sqrt(d2) / LINK_DIST) * 0.28;
            ctx.strokeStyle = 'rgba(120,150,210,' + alpha.toFixed(3) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
          }
        }
      }

      // signals travelling along edges
      for (let i = signals.length - 1; i >= 0; i--) {
        const s = signals[i];
        s.t += s.speed;
        if (s.t >= 1) { signals.splice(i, 1); continue; }
        const a = nodes[s.a], b = nodes[s.b];
        if (!a || !b) { signals.splice(i, 1); continue; }
        const x = a.x + (b.x - a.x) * s.t;
        const y = a.y + (b.y - a.y) * s.t;
        ctx.beginPath();
        ctx.fillStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 8;
        ctx.arc(x, y, 2.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // nodes (dots + squares)
      for (const n of nodes) {
        const throb = 0.7 + 0.3 * Math.sin(n.pulse);
        ctx.fillStyle = n.color;
        ctx.globalAlpha = 0.55 * throb + 0.25;
        if (n.square) {
          const s = n.size;
          ctx.save();
          ctx.translate(n.x, n.y);
          roundRect(ctx, -s / 2, -s / 2, s, s, 1.5);
          ctx.fill();
          ctx.restore();
        } else {
          ctx.beginPath();
          ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.globalAlpha = 1;

      if (!reduce && frame % 13 === 0 && signals.length < 14) spawnSignal();
    }

    function loop(now) {
      if (!running) return;
      if (now - last >= FRAME_MS) { last = now; render(); }
      requestAnimationFrame(loop);
    }

    function start() {
      if (running || reduce) return;
      running = true; last = 0;
      requestAnimationFrame(loop);
    }
    function stop() { running = false; }

    function roundRect(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      c.closePath();
    }

    window.addEventListener('resize', debounce(resize, 150));
    document.addEventListener('visibilitychange', () => { document.hidden ? stop() : start(); });
    document.addEventListener('flume:resume', start);

    resize();
    if (reduce) render(); else start();
  })();
  </script>

  <!-- Animated logo mark -->
  <script>
  (function () {
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const cv = document.getElementById('markcanvas');
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const VBW = 120, VBH = 130;
    const FRAME_MS = 1000 / 30;

    const BASE = {"s0": [33, 22], "s1": [33, 44], "s2": [33, 66], "s3": [33, 87], "s4": [33, 108], "a1": [55, 23], "a2": [76, 24], "a3": [97, 27], "b1": [52, 65], "b2": [70, 64], "b3": [86, 63]};
    const EDGES = [["s0", "s1"], ["s1", "s2"], ["s2", "s3"], ["s3", "s4"], ["s0", "a1"], ["a1", "a2"], ["a2", "a3"], ["s2", "b1"], ["b1", "b2"], ["b2", "b3"], ["s1", "a1"], ["s3", "b1"]];
    const SQUARES = new Set(["s0", "a3", "b3", "s4"]);
    const PURP = new Set(["a2", "b2", "s3"]);
    const keys = Object.keys(BASE);

    const drift = {};
    keys.forEach((k) => {
      drift[k] = {
        ax: 1.3 + Math.random() * 1.6, ay: 1.3 + Math.random() * 1.6,
        px: Math.random() * Math.PI * 2, py: Math.random() * Math.PI * 2,
        sx: 0.18 + Math.random() * 0.14, sy: 0.16 + Math.random() * 0.14,
        pulse: Math.random() * Math.PI * 2
      };
    });

    let W, H, S, OX, OY, t = 0;
    function fit() {
      const r = cv.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      cv.width = r.width * dpr; cv.height = r.height * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      W = r.width; H = r.height;
      S = Math.min(W / VBW, H / VBH);
      OX = (W - VBW * S) / 2; OY = (H - VBH * S) / 2;
    }
    function pos(k) {
      const d = drift[k], b = BASE[k];
      const dx = reduce ? 0 : Math.sin(t * d.sx + d.px) * d.ax;
      const dy = reduce ? 0 : Math.cos(t * d.sy + d.py) * d.ay;
      return [OX + (b[0] + dx) * S, OY + (b[1] + dy) * S];
    }

    function edgeColor(y) {
      const f = Math.max(0, Math.min(1, (y - OY) / (VBH * S)));
      if (f < 0.5) return lerpHex('#0ad6f0', '#0a74fa', f / 0.5);
      return lerpHex('#0a74fa', '#cf7ff2', (f - 0.5) / 0.5);
    }
    function lerpHex(a, b, f) {
      const pa = [parseInt(a.slice(1,3),16),parseInt(a.slice(3,5),16),parseInt(a.slice(5,7),16)];
      const pb = [parseInt(b.slice(1,3),16),parseInt(b.slice(3,5),16),parseInt(b.slice(5,7),16)];
      const r = pa.map((v,i)=>Math.round(v+(pb[i]-v)*f));
      return 'rgb(' + r.join(',') + ')';
    }

    const comets = [];
    function spawn() {
      const e = EDGES[(Math.random() * EDGES.length) | 0];
      const dir = Math.random() < 0.5;
      comets.push({ a: dir ? e[0] : e[1], b: dir ? e[1] : e[0],
        t: 0, speed: 0.0038 + Math.random() * 0.0042,
        color: ['#1fd2f0','#5aa6ff','#c98cf0'][(Math.random()*3)|0],
        trail: [] });
    }

    let frame = 0, last = 0, running = false;
    function render() {
      ctx.clearRect(0, 0, W, H);
      t += 0.016;

      const P = {}; keys.forEach(k => P[k] = pos(k));
      ctx.lineCap = 'round';
      for (const [a, b] of EDGES) {
        const pa = P[a], pb = P[b];
        const grad = ctx.createLinearGradient(pa[0], pa[1], pb[0], pb[1]);
        grad.addColorStop(0, edgeColor(pa[1]));
        grad.addColorStop(1, edgeColor(pb[1]));
        ctx.strokeStyle = grad;
        ctx.lineWidth = 2 * S / (VBW/120);
        ctx.globalAlpha = 0.85;
        ctx.beginPath(); ctx.moveTo(pa[0], pa[1]); ctx.lineTo(pb[0], pb[1]); ctx.stroke();
      }
      ctx.globalAlpha = 1;

      ctx.globalCompositeOperation = 'lighter';
      for (let i = comets.length - 1; i >= 0; i--) {
        const c = comets[i];
        c.t += c.speed;
        const A = P[c.a], B = P[c.b];
        const x = A[0] + (B[0]-A[0]) * c.t, y = A[1] + (B[1]-A[1]) * c.t;
        c.trail.push([x, y]); if (c.trail.length > 12) c.trail.shift();
        for (let j = 0; j < c.trail.length; j++) {
          const tp = c.trail[j], f = j / c.trail.length;
          ctx.globalAlpha = f * 0.4;
          ctx.fillStyle = c.color;
          ctx.beginPath(); ctx.arc(tp[0], tp[1], (0.4 + f * 1.5) * S/2, 0, 6.283); ctx.fill();
        }
        ctx.globalAlpha = 0.9;
        ctx.shadowColor = c.color; ctx.shadowBlur = 6;
        ctx.fillStyle = c.color;
        ctx.beginPath(); ctx.arc(x, y, 1.5 * S/2, 0, 6.283); ctx.fill();
        ctx.shadowBlur = 0;
        if (c.t >= 1) comets.splice(i, 1);
      }
      ctx.globalAlpha = 1; ctx.globalCompositeOperation = 'source-over';

      for (const k of keys) {
        const p = P[k], d = drift[k];
        const throb = 0.78 + 0.22 * Math.sin(t * 1.4 + d.pulse);
        if (SQUARES.has(k)) {
          const s = 7.0 * S/(VBW/120) * throb;
          ctx.fillStyle = '#dff7ff';
          ctx.save(); ctx.translate(p[0], p[1]);
          rr(ctx, -s/2, -s/2, s, s, 1.6*S/(VBW/120)); ctx.fill(); ctx.restore();
        } else {
          const isP = PURP.has(k);
          const r = (isP ? 3.0 : 3.3) * S/(VBW/120) * throb;
          const g = ctx.createRadialGradient(p[0], p[1], 0, p[0], p[1], r);
          if (isP) { g.addColorStop(0, '#f0d6ff'); g.addColorStop(1, '#cf7ff2'); }
          else     { g.addColorStop(0, '#eafcff'); g.addColorStop(1, '#1aa6ec'); }
          ctx.fillStyle = g;
          ctx.beginPath(); ctx.arc(p[0], p[1], r, 0, 6.283); ctx.fill();
        }
      }

      frame++;
      if (!reduce && frame % 20 === 0 && comets.length < 4) spawn();
    }

    function loop(now) {
      if (!running) return;
      if (now - last >= FRAME_MS) { last = now; render(); }
      requestAnimationFrame(loop);
    }
    function start() {
      if (running || reduce) return;
      running = true; last = 0;
      requestAnimationFrame(loop);
    }
    function stop() { running = false; }

    function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath();}

    window.addEventListener('resize', debounce(fit, 150));
    document.addEventListener('visibilitychange', () => { document.hidden ? stop() : start(); });
    document.addEventListener('flume:resume', start);

    fit();
    if (reduce) { render(); } else { spawn(); start(); }
  })();
  </script>
</body>
</html>
